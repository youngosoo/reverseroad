<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <button id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
    </button>
    <div id="app">
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container" aria-live="polite"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <section id="partnership">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mykaejbj" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="Your Message" rows="4" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </section>

    <script src="main.js"></script>
</body>
</html>
