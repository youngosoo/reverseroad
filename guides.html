<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV to MP3 변환기 | 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-300 min-h-screen">
    <!-- Simple Header -->
    <header class="border-b border-slate-800 p-4">
        <nav class="max-w-4xl mx-auto flex gap-4 text-sm font-medium">
            <a href="index.html" class="text-slate-400 hover:text-white">홈</a>
            <a href="guides.html" class="text-indigo-400">가이드</a>
        </nav>
    </header>

    <div class="max-w-4xl mx-auto p-8 space-y-6">
        <h1 class="text-3xl font-bold text-white">오디오 변환 가이드</h1>
        
        <h2 class="text-2xl font-semibold text-white mt-6">WAV vs MP3: 무엇이 다른가요?</h2>
        <p>WAV는 비압축 무손실 포맷으로 원음 그대로를 보존하지만 용량이 매우 큽니다. 반면, MP3는 손실 압축 포맷으로 음질을 유지하면서 용량을 획기적으로 줄여, 휴대나 전송에 적합합니다.</p>
        
        <h2 class="text-2xl font-semibold text-white mt-6">왜 본 사이트를 사용해야 하나요?</h2>
        <p>기존 서비스들은 파일을 서버로 업로드하여 변환합니다. 이는 보안상 위험할 수 있습니다. 본 사이트는 브라우저 내에서 직접 변환을 수행하므로, 사용자의 소중한 데이터가 외부로 유출되지 않습니다. 안심하고 사용하세요!</p>
    </div>
</body>
</html>
